<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Detail Motor — RideEasy</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/detail.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/custom.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="index.html">RideEasy</a>
      <nav class="nav">
        <a href="index.html" class="nav-link">Beranda</a>
        <a href="about.html" class="nav-link">Tentang Kami</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="breadcrumb"><a href="index.html">Beranda</a> &gt; <span id="crumbMotor">Detail</span></div>

    <section class="detail-top">
      <div class="image-column card">
        <div class="gallery">
          <img id="detailImage" src="img/motor1.jpg" alt="motor image">
        </div>
      </div>

      <div class="info-column card">
        <div class="title-row">
          <h1 id="motorName">Yamaha NMAX 125</h1>
          <div class="badge">Tersedia</div>
        </div>

        <p id="motorShort" class="short-desc">Motor matic premium, nyaman untuk perjalanan jauh.</p>

        <ul class="specs" id="specList"></ul>

        <div class="price-row">
          <div class="price-per-day" id="pricePerDay">Rp120.000 / hari</div>
          <div class="total-price">Total: <span id="totalHarga">Rp120.000</span></div>
        </div>

        <div class="rent-panel card small" id="rentPanel">
          <label for="durasi">Durasi Sewa</label>
          <select id="durasi">
            <option value="12">12 Jam</option>
            <option value="24">1 Hari</option>
            <option value="48">2 Hari</option>
            <option value="72">3 Hari</option>
          </select>

          <label for="tanggal">Tanggal Pengambilan</label>
          <input type="date" id="tanggal">

          <a id="btnBooking" class="btn btn-primary btn-block" href="booking.html">Booking Sekarang</a>
        </div>
      </div>
    </section>

    <section class="more-info card">
      <h3>Deskripsi</h3>
      <div id="longDesc">Deskripsi</div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-inner">
        <div>© 2025 RideEasy</div>
      </div>
    </div>
  </footer>

  <script src="js/detail.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <script>
    // Navbar color change on scroll
    (function(){
      const header = document.querySelector('.site-header');
      window.addEventListener('scroll', function(){
        if(window.scrollY > 60) header.classList.add('scrolled'); else header.classList.remove('scrolled');
      });
      // simple entry animations for sections
      gsap.utils.toArray('section').forEach((sec, i) => {
        gsap.fromTo(sec, {opacity:0, y:30},{opacity:1, y:0, duration:0.8, delay: i*0.12, scrollTrigger:{trigger:sec, start:'top 80%'}});
      });
      // slide-like transitions for elements with .section-slide
      gsap.utils.toArray('.section-slide').forEach((el, idx) => {
        gsap.fromTo(el, {x:50,opacity:0},{x:0,opacity:1,duration:0.7,scrollTrigger:{trigger:el, start:'top 85%'}});
      });
    })();
  </script>


</body>
</html>
