<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Booking — RideEasy</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/booking.css">
  <link rel="stylesheet" href="css/custom.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="index.html">RideEasy</a>
      <nav class="nav">
        <a href="index.html" class="nav-link">Beranda</a>
        <a href="about.html" class="nav-link">Tentang Kami</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="booking-section">
      <h2>Form Booking Motor</h2>
      <div id="detailMotorBox" class="motor-summary-box card"></div>

      <form id="formBooking" class="booking-form card">
        <div class="form-row">
          <div class="form-group">
            <label for="nama">Nama Lengkap</label>
            <input type="text" id="nama" placeholder="Agoy" required>
          </div>
          <div class="form-group">
            <label for="nomorIdentitas">Unggah Nomor Identitas</label>
            <input type="file" id="nomorIdentitas" name="nomorIdentitas" accept=".jpg,.jpeg,.png,.pdf" required>
            <div class="file-hint">Unggah KTP, SIM, atau ID lainnya (jpg/png/pdf)</div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="whatsapp">Nomor WhatsApp</label>
            <input type="text" id="whatsapp" placeholder="+62..." required>
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="email@example.com" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="motor">Motor</label>
            <input type="text" id="motor" readonly>
          </div>
          <div class="form-group">
            <label for="durasi">Durasi (jam)</label>
            <input type="number" id="durasi" min="1" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="harga">Total Harga</label>
            <input type="text" id="harga" readonly>
          </div>
          <div class="form-group">
            <label for="dp">DP (50%)</label>
            <input type="text" id="dp" readonly>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Booking Sekarang</button>
      </form>

      <div id="pesanSukses" class="pesan-sukses card" style="display:none;">
        <h3>Booking Berhasil!</h3>
        <p>Terima kasih telah memesan di RideEasy.</p>
        <a href="index.html" class="btn">Kembali ke Beranda</a>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-inner">© 2025 RideEasy</div>
    </div>
  </footer>

  <script src="js/booking.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <script>
    // Navbar color change on scroll
    (function(){
      const header = document.querySelector('.site-header');
      window.addEventListener('scroll', function(){
        if(window.scrollY > 60) header.classList.add('scrolled'); else header.classList.remove('scrolled');
      });
      // simple entry animations for sections
      gsap.utils.toArray('section').forEach((sec, i) => {
        gsap.fromTo(sec, {opacity:0, y:30},{opacity:1, y:0, duration:0.8, delay: i*0.12, scrollTrigger:{trigger:sec, start:'top 80%'}});
      });
      // slide-like transitions for elements with .section-slide
      gsap.utils.toArray('.section-slide').forEach((el, idx) => {
        gsap.fromTo(el, {x:50,opacity:0},{x:0,opacity:1,duration:0.7,scrollTrigger:{trigger:el, start:'top 85%'}});
      });
    })();
  </script>
</body>
</html>
